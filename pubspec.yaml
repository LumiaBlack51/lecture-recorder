name: lecture_recorder
description: "Cross-platform lecture recorder for Windows and Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.5.0
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  record: ^6.1.2
  share_plus: ^11.1.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 256
  image_path: "assets/icons/app_icon.png"
